<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frames by Jim</title>

    <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#0d0d0d;
    color:white;
    overflow-x:hidden;
}

header{
    position:relative;
    width:100%;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;

background:
linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.65)),
url("images/main header.jpg");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

}

.hero{
    animation:fadeUp 1.5s ease;
}

.hero h1{
    font-size:clamp(3rem,8vw,6rem);
    letter-spacing:3px;
    font-weight:700;
}

.hero p{
    margin-top:20px;
    font-size:1.2rem;
    color:#ddd;
}

.btn{
    display:inline-block;
    margin-top:40px;
    padding:16px 42px;
    border:2px solid white;
    color:white;
    text-decoration:none;
    border-radius:40px;
    transition:.35s;
}

.btn:hover{
    background:white;
    color:black;
}

.scroll{
    position:absolute;
    bottom:35px;
    left:50%;
    transform:translateX(-50%);
    font-size:.9rem;
    opacity:.7;
    animation:bounce 2s infinite;
}

@keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

@keyframes bounce{

    0%,20%,50%,80%,100%{
        transform:translate(-50%,0);
    }

    40%{
        transform:translate(-50%,-10px);
    }

    60%{
        transform:translate(-50%,-5px);
    }

}
    </style>

</head>
<body>

<header>

    <div class="hero">

        <h1>Frames by Jim</h1>

        <p>Capturing stories through light.</p>

        <a href="#gallery" class="btn">
            Explore Portfolio
        </a>

    </div>

    <div class="scroll">
        ↓ Scroll to discover ↓
    </div>

</header>
<section id="gallery">

    <h2>Featured Photos</h2>

    <div class="gallery">

        <img src="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?auto=format&fit=crop&w=800&q=80" alt="Photo 1">

        <img src="https://images.unsplash.com/photo-1516035069371-33534b4b7e36?auto=format&fit=crop&w=800&q=80" alt="Photo 2">

        <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=800&q=80" alt="Photo 3">

        <img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c?auto=format&fit=crop&w=800&q=80" alt="Photo 4">

    </div>

</section>

<footer>

    © 2026 Frames by Jim

</footer>

</body>
</html>
