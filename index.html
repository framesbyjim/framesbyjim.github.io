<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frames by Jim</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}
}

html{
    scroll-behavior:smooth;
}

body{
    background:#0d0d0d;
    color:white;
    overflow-x:hidden;
}

header{
    position:relative;
    width:100%;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    animation:zoomHero 10s ease forwards;

background:
linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.65)),
url("images/main header.jpg");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

}

.hero{

    text-align:center;

    animation:fadeUp 1.2s ease forwards;

    opacity:0;

}
.hero h1{

    font-family:'Cormorant Garamond', serif;

    font-size:clamp(4rem,8vw,7rem);

    font-weight:600;

    letter-spacing:6px;

    text-transform:uppercase;

    animation:fadeUp 1.3s ease forwards;

    opacity:0;

}

.hero p{

    margin-top:20px;

    font-size:1.2rem;

    font-weight:300;

    letter-spacing:2px;

    color:#e4e4e4;

    animation:fadeUp 1.8s ease forwards;

    opacity:0;

}

.hero-btn,
.hero-btn:visited{

    color:#111;

    text-decoration:none;

}
{

    display:inline-block;

    margin-top:35px;

    padding:16px 42px;

    border-radius:50px;

    background:#ffffff;

    color:#111;

    text-decoration:none;

    font-family:'Poppins', sans-serif;

    font-weight:600;

    transition:.35s ease;

}

.hero-btn:hover{

    background:#c8a96a;

    color:#111;

    transform:translateY(-4px);

    box-shadow:0 15px 35px rgba(200,169,106,.35);

}

.scroll{

    position:absolute;

    bottom:35px;

    left:50%;

    transform:translateX(-50%);

    color:white;

    letter-spacing:2px;

    font-size:.9rem;

    animation:bounce 2s infinite;

}

@keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

@keyframes bounce{

    0%,20%,50%,80%,100%{
        transform:translate(-50%,0);
    }

    40%{
        transform:translate(-50%,-10px);
    }

    60%{
        transform:translate(-50%,-5px);
    }

}/* Navigation */

#navbar{

    position:fixed;

    top:0;

    left:0;

    width:100%;

    padding:22px 8%;

    display:flex;

    justify-content:space-between;

    align-items:center;

    transition:.4s;

    z-index:999;

}

#navbar.scrolled{

    background:rgba(10,10,10,.92);

    backdrop-filter:blur(10px);

    box-shadow:0 5px 20px rgba(0,0,0,.25);

}

.logo{

    font-family:'Cinzel', serif;

    font-size:1.7rem;

    font-weight:600;

    letter-spacing:3px;

    text-transform:uppercase;

}

#navbar ul{

    display:flex;

    list-style:none;

    gap:35px;

}

#navbar a{

    color:white;

    text-decoration:none;

    font-size:.95rem;

    font-weight:500;

    letter-spacing:1px;

    transition:.3s;

    position:relative;

}

#navbar a::after{

    content:"";

    position:absolute;

    left:0;

    bottom:-6px;

    width:0;

    height:2px;

    background:white;

    transition:.3s;

}

#navbar a:hover::after{

    width:100%;

}
        #gallery{

    padding:120px 8%;

    background:#111;

}

.gallery-header{

    text-align:center;

    margin-bottom:70px;

}

.gallery-subtitle{

    color:#c8a96a;

    letter-spacing:5px;

    font-size:.9rem;

    margin-bottom:15px;

}

.gallery-header h2{

    font-family:'Cormorant Garamond', serif;

    font-size:3.3rem;

    margin-bottom:15px;

}

.gallery-description{

    color:#bbb;

    max-width:650px;

    margin:auto;

    line-height:1.8;

}

.gallery{

    columns:3 280px;

    column-gap:18px;

}

.photo{

    margin-bottom:18px;

    break-inside:avoid;

    overflow:hidden;

    border-radius:18px;

}

.photo img{

    width:100%;

    display:block;

    border-radius:18px;

    transition:.45s;

}

.photo:hover img{

    transform:scale(1.06);

}
        @keyframes fadeUp{

    from{

        opacity:0;

        transform:translateY(40px);

    }

    to{

        opacity:1;

        transform:translateY(0);

    }

}

@keyframes bounce{

    0%,100%{

        transform:translate(-50%,0);

    }

    50%{

        transform:translate(-50%,10px);

    }

}

@keyframes zoomHero{

    from{

        background-size:100%;

    }

    to{

        background-size:110%;

    }

}
    </style>

</head>
<body>
<nav id="navbar">

    <div class="logo">
        Frames by Jim
    </div>

    <ul>

        <li><a href="#home">Home</a></li>

        <li><a href="#gallery">Portfolio</a></li>

        <li><a href="#about">About</a></li>

        <li><a href="#contact">Contact</a></li>

    </ul>

</nav>
<header id="home">

    <div class="hero">

        <h1>Frames by Jim</h1>

        <p>Capturing stories through light.</p>

        <a href="#gallery" class="btn">
            Explore collection
        </a>

    </div>

    <div class="scroll">
        ↓ Scroll to discover ↓
    </div>

</header>
<section id="gallery">

<div class="gallery-header">

    <p class="gallery-subtitle">
        SELECTED WORK
    </p>

    <h2>
        Stories Through My Lens
    </h2>

    <p class="gallery-description">
        Every frame captures a moment, an emotion, or a story worth remembering.
    </p>

</div>

<div class="gallery">

    <div class="photo tall">
        <img src="images/photo1.jpg" alt="">
    </div>

    <div class="photo">
        <img src="images/photo2.jpg" alt="">
    </div>

    <div class="photo wide">
        <img src="images/photo3.jpg" alt="">
    </div>

    <div class="photo">
        <img src="images/photo4.jpg" alt="">
    </div>

    <div class="photo tall">
        <img src="images/photo5.jpg" alt="">
    </div>

    <div class="photo">
        <img src="images/photo6.jpg" alt="">
    </div>

</div>

</section>
<footer>

    © 2026 Frames by Jim

</footer>
<script>

const navbar = document.getElementById("navbar");

window.addEventListener("scroll", () => {

    if(window.scrollY > 50){

        navbar.classList.add("scrolled");

    }else{

        navbar.classList.remove("scrolled");

    }

});

</script>
</body>
</html>
