<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frames by Jim</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#111;
            color:white;
        }

        header{
            height:100vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
            background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
            url("https://images.unsplash.com/photo-1516035069371-29a1b244cc32?auto=format&fit=crop&w=1600&q=80");
            background-size:cover;
            background-position:center;
        }

        h1{
            font-size:4rem;
        }

        p{
            margin-top:15px;
            font-size:1.2rem;
            color:#ddd;
        }

        .btn{
            margin-top:30px;
            padding:15px 35px;
            background:white;
            color:black;
            text-decoration:none;
            border-radius:30px;
            font-weight:bold;
        }

        section{
            padding:80px 10%;
        }

        .gallery{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:20px;
        }

        .gallery img{
            width:100%;
            height:300px;
            object-fit:cover;
            border-radius:15px;
            transition:.3s;
        }

        .gallery img:hover{
            transform:scale(1.05);
        }

        footer{
            text-align:center;
            padding:30px;
            color:#aaa;
        }
    </style>

</head>
<body>

<header>
    <h1>Frames by Jim</h1>
    <p>Capturing moments. Creating memories.</p>

    <a href="#gallery" class="btn">View Gallery</a>
</header>

<section id="gallery">

<h2 style="margin-bottom:30px;">Featured Photos</h2>

<div class="gallery">

<img src="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?auto=format&fit=crop&w=800&q=80">

<img src="https://images.unsplash.com/photo-1516035069371-29a1b244cc32?auto=format&fit=crop&w=800&q=80">

<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=800&q=80">

<img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c?auto=format&fit=crop&w=800&q=80">

</div>

</section>

<footer>
© 2026 Frames by Jim
</footer>

</body>
</html>
